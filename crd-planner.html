<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRD Construction Planning &amp; Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F9F9FB; --panel:#FFFFFF; --border:#E4E4EA; --border-soft:#EEEEF2;
  --text:#191919; --muted:#74747E; --navy:#1B365D; --navy-soft:#E8EDF5;
  --teal:#0F766E; --teal-soft:#D9EEEC; --red:#D0342C; --red-soft:#FBEAE9;
  --green:#15803D; --amber:#B45309;
  --row-h:30px; --header-h:44px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Prompt','Leelawadee UI','Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--text); font-size:13px;
  display:flex; flex-direction:column; overflow:hidden;
}
button{font-family:inherit}
input,select{font-family:inherit;font-size:12.5px}

/* ---------- Top bar ---------- */
#topbar{
  position:sticky; top:0; z-index:50; flex:0 0 auto;
  display:flex; align-items:stretch; gap:6px; flex-wrap:nowrap; overflow-x:auto;
  padding:5px 10px; background:var(--panel); border-bottom:1px solid var(--border);
}
.tgroup{
  display:flex; flex-direction:column; align-items:center; gap:2px; flex:0 0 auto;
  padding:3px 5px 2px; border:1px solid var(--border-soft); border-radius:9px;
  background:#FBFBFD;
}
.tgroup .gbtns{display:flex; align-items:center; gap:3px}
.tgroup .glabel{font-size:9px; color:var(--muted); line-height:1; letter-spacing:.2px; user-select:none; white-space:nowrap}
.tgroup .btn{padding:4px 5px; font-size:11px}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:3px}
.btn svg{width:15px;height:15px;flex:0 0 auto;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.btn .bl{font-size:9.5px;font-weight:500;letter-spacing:.2px;line-height:1}
#tip{
  position:fixed; z-index:999; display:none; pointer-events:none;
  background:#26262E; color:#fff; font-size:11px; line-height:1.45;
  padding:5px 9px; border-radius:6px; max-width:260px;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
}
#brandbar{
  flex:0 0 auto; display:flex; align-items:center;
  padding:4px 12px; background:var(--navy); border-bottom:1px solid var(--border);
}
#brand{display:flex;align-items:baseline;gap:10px}
#brand .logo{
  align-self:center; height:30px; width:auto; border-radius:6px; background:#fff;
  padding:2px 5px; display:block;
}
#brand .t1{font-weight:600;font-size:13px;line-height:1.2;color:#fff}
#brand .t2{font-size:11px;color:#B9C6DA;line-height:1.2}
.btn{
  border:1px solid var(--border); background:var(--panel); color:var(--text);
  border-radius:8px; padding:6px 12px; font-size:12.5px; cursor:pointer;
  transition:background .15s,border-color .15s;
}
.btn:hover{background:#F3F3F7;border-color:#D6D6DE}
.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary:hover{background:#254775}
.btn.danger:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.btn.toggled{background:var(--navy-soft);border-color:var(--navy);color:var(--navy)}
.btn:disabled{opacity:.45;cursor:default}
.btn:disabled:hover{background:var(--panel);border-color:var(--border)}
.sep{width:1px;height:24px;background:var(--border)}
.spacer{flex:1}
select.btn{display:inline-block;padding:4px 4px;font-size:11px}
#statusDateWrap{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
#statusDate{border:1px solid var(--border);border-radius:7px;padding:3px 5px;background:var(--panel);font-size:11px}

/* ---------- EVM strip ---------- */
#evmStrip{
  flex:0 0 auto; display:flex; gap:10px; align-items:stretch; overflow-x:auto;
  padding:10px 16px; background:var(--bg); border-bottom:1px solid var(--border);
}
#evmStrip.hidden{display:none}
.card{
  min-width:118px; background:var(--panel); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px;
}
.card .k{font-size:10.5px;color:var(--muted);letter-spacing:.3px;white-space:nowrap}
.card .v{font-size:16px;font-weight:600;margin-top:1px;white-space:nowrap}
.card .s{font-size:10px;color:var(--muted);white-space:nowrap}
.card.wide{min-width:170px}
.pos{color:var(--green)} .neg{color:var(--red)} .neutral{color:var(--navy)}

/* ---------- Main dual pane ---------- */
#main{flex:1 1 auto; display:flex; min-height:0; background:var(--panel)}
#leftPane{flex:0 0 640px; min-width:320px; max-width:75vw; overflow:auto; border-right:none; position:relative}
#divider{flex:0 0 5px; cursor:col-resize; background:var(--border-soft); border-left:1px solid var(--border); border-right:1px solid var(--border)}
#divider:hover{background:#DCDCE4}
#rightPane{flex:1 1 auto; overflow:auto; position:relative; background:var(--panel)}

/* ---------- Table ---------- */
/* width:0 + table-layout:fixed → ความกว้างตาราง = ผลรวม col ทำให้ลากปรับคอลัมน์ได้จริง */
table{border-collapse:separate;border-spacing:0;table-layout:fixed;width:0}
thead th{
  position:sticky;top:0;z-index:10;height:var(--header-h);
  background:#F4F5F8;border-bottom:1px solid var(--border);border-right:1px solid var(--border-soft);
  font-size:11px;font-weight:500;color:var(--muted);padding:0 8px;text-align:left;white-space:nowrap;
  overflow:hidden;
}
.colgrip{
  position:absolute;top:0;right:0;width:7px;height:100%;cursor:col-resize;user-select:none;
  border-right:2px solid transparent;
}
.colgrip:hover,.colgrip.dragging{border-right-color:var(--navy)}
body.col-resizing{cursor:col-resize;user-select:none}
tbody td{
  height:var(--row-h);max-height:var(--row-h);padding:0 8px;
  border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;vertical-align:middle;
  color:#000;
}
tbody tr:hover td{background:#F6F7FA}
tr.summary td{font-weight:700;color:#000;background:#FBFBFD}
tr.summary:hover td{background:#F2F4F9}
body.show-crit tr.critical td.c-name{color:var(--red)}
body.show-crit tr.summary.critical td.c-name{color:var(--red)}
td.num{text-align:right}
td.editable{cursor:text}
td.editable:hover{box-shadow:inset 0 0 0 1px #C9D4E4}
td .toggle{
  display:inline-block;width:14px;cursor:pointer;color:var(--muted);
  font-size:9px;margin-right:2px;user-select:none;text-align:center;
}
td input.cellEdit{
  width:100%;border:1px solid var(--navy);border-radius:4px;padding:2px 4px;outline:none;font-size:12px;background:#fff;
}
.chip{display:inline-block;font-size:.84em;border-radius:999px;padding:1px 7px;line-height:1.5}
.chip.late{background:var(--red-soft);color:var(--red)}
.chip.ok{background:var(--teal-soft);color:var(--teal)}
.chip.done{background:var(--navy-soft);color:var(--navy)}
.chip.na{background:#F0F0F4;color:var(--muted)}

/* ---------- Row selection / duration spinner / start date picker ---------- */
tbody tr.selrow td, tbody tr.summary.selrow td{background:#E8EEF8}
tbody tr.dragging td{opacity:.45}
tbody tr.drop-above td{box-shadow:inset 0 2px 0 0 var(--navy)}
tbody tr.drop-below td{box-shadow:inset 0 -2px 0 0 var(--navy)}
.spin{display:inline-flex;flex-direction:column;vertical-align:-3px;margin-left:5px}
.spin b{font-size:7px;line-height:7px;font-weight:400;color:var(--muted);cursor:pointer;padding:0 2px;user-select:none}
.spin b:hover{color:var(--navy)}
.calBtn{display:inline-block;margin-left:5px;color:var(--muted);cursor:pointer;font-size:8px;user-select:none}
.calBtn:hover{color:var(--navy)}
#startPick{position:fixed;opacity:0;width:14px;height:14px;border:0;padding:0;z-index:200}

/* ---------- Gantt ---------- */
#ganttInner{position:relative}
#ganttHeader{position:sticky;top:0;z-index:10;background:#F4F5F8;border-bottom:1px solid var(--border)}
svg{display:block}
svg text{font-family:'Prompt','Leelawadee UI',sans-serif}

/* ---------- Footer ---------- */
#footer{
  flex:0 0 auto; display:flex; gap:18px; align-items:center;
  padding:5px 16px; background:var(--panel); border-top:1px solid var(--border);
  font-size:11px; color:var(--muted); flex-wrap:wrap;
}
#footer b{color:var(--text);font-weight:500}
#footer .crit b{color:var(--red)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#D4D4DC;border-radius:6px;border:2px solid var(--panel)}
::-webkit-scrollbar-thumb:hover{background:#BFBFC9}
::-webkit-scrollbar-corner{background:transparent}
</style>
</head>

const fmtMoney = v => (v === 0 ? '-' : v.toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:0}));
const fmtNum = (v, d=2) => (v === null || !isFinite(v)) ? '—' : v.toLocaleString('th-TH', {minimumFractionDigits:d, maximumFractionDigits:d});

/* ---------------------------------------------------------------------
   State
--------------------------------------------------------------------- */
let state = null;         // { projectStart, statusDate, baselineSet, activeBl, zoom, showLinks, evmVisible, tasks[] }
let collapsed = new Set();
let byUid = new Map();
let visibleRows = [];     // tasks currently shown (respecting collapse)
let projectEndDay = 0;
let saveTimer = null;
let selectedUid = null;   // uid of the row selected for structure editing

function d2date(day) { return new Date(fromISO(state.projectStart).getTime() + day * DAY); }
function fmtDay(day) {
  const d = d2date(day);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String((d.getFullYear()+543)%100).padStart(2,'0')}`;
}
function isoToDay(s) { return daysBetween(state.projectStart, s); }

/* ---------------------------------------------------------------------
   Data init & hierarchy (outline-level scan)
--------------------------------------------------------------------- */
function buildDefaultState() {
  const raw = JSON.parse(document.getElementById('task-data').textContent)
    .filter(t => t.uid !== 0 && t.outlineLevel >= 1);
  let minStart = raw.reduce((m, t) => (t.start && t.start < m) ? t.start : m, '9999-12-31');
  const tasks = raw.map(t => ({
    uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
    duration: t.duration, milestone: !!t.milestone,
    predecessors: (t.predecessors || []).map(p => ({ id: p.id, type: p.type, lag: p.lag })),
    percentComplete: t.percentComplete || 0,
    baselineCost: t.cost || 0, actualCost: 0,
    snet: t.start ? daysBetween(minStart, t.start) : 0,
    blStart: null, blFinish: null, bl: {}
  }));
  return {
    projectStart: minStart, statusDate: toISO(new Date()),
    baselineSet: false, activeBl: 1, zoom: 'week', zoomPx: null, showLinks: false, showCritical: false, evmVisible: true,
    projName: 'Arise Hill Sansai', tasks
  };
}

function buildHierarchy() {
  byUid = new Map();
  const stack = [];
  for (const t of state.tasks) {
    t.children = []; t.parent = null;
    byUid.set(t.uid, t);
    while (stack.length && stack[stack.length-1].outlineLevel >= t.outlineLevel) stack.pop();
    if (stack.length) { t.parent = stack[stack.length-1]; t.parent.children.push(t); }
    stack.push(t);
  }
  for (const t of state.tasks) t.isSummary = t.children.length > 0;
}

function leavesUnder(t, out) {
  if (!t.children.length) { out.push(t); return out; }
  for (const c of t.children) leavesUnder(c, out);
  return out;
}

/* ---------------------------------------------------------------------
   CPM Engine  (7-day calendar : day arithmetic = calendar arithmetic)
--------------------------------------------------------------------- */
class CPMCalculator {
  constructor(tasks) { this.tasks = tasks; }

  // expand links so the network contains leaf tasks only
  buildLinks() {
    const links = [];
    for (const t of this.tasks) {
      for (const p of t.predecessors) {
        const predTask = byUid.get(p.id);
        if (!predTask) continue;
        const froms = leavesUnder(predTask, []);
        const tos = leavesUnder(t, []);
        for (const f of froms) for (const s of tos) {
          if (f.uid === s.uid) continue;
          links.push({ from: f.uid, to: s.uid, type: p.type || 'FS', lag: p.lag || 0 });
        }
      }
    }
    return links;
  }

  compute() {
    const leaves = this.tasks.filter(t => !t.isSummary);
    const links = this.buildLinks();
    const adjOut = new Map(), adjIn = new Map(), indeg = new Map();
    for (const l of leaves) { adjOut.set(l.uid, []); adjIn.set(l.uid, []); indeg.set(l.uid, 0); }
    for (const lk of links) {
      if (!adjOut.has(lk.from) || !adjOut.has(lk.to)) continue;
      adjOut.get(lk.from).push(lk); adjIn.get(lk.to).push(lk);
      indeg.set(lk.to, indeg.get(lk.to) + 1);
    }
    // Kahn topological sort + cycle detection
    const order = [], q = [];
    const deg = new Map(indeg);
    for (const l of leaves) if (deg.get(l.uid) === 0) q.push(l.uid);
    while (q.length) {
      const u = q.shift(); order.push(u);
      for (const lk of adjOut.get(u)) {
        deg.set(lk.to, deg.get(lk.to) - 1);
        if (deg.get(lk.to) === 0) q.push(lk.to);
      }
    }
    if (order.length < leaves.length) {
      const inCycle = leaves.filter(l => !order.includes(l.uid));
      return { ok: false, cycle: inCycle.map(t => `#${t.uid} ${t.name}`) };
    }

    const es = new Map(), ef = new Map(), ls = new Map(), lf = new Map();
    // forward pass — SNET floor only for tasks with no incoming links
    for (const l of leaves) es.set(l.uid, adjIn.get(l.uid).length ? 0 : Math.max(0, l.snet || 0));
    for (const u of order) {
      const t = byUid.get(u);
      ef.set(u, es.get(u) + t.duration);
      for (const lk of adjOut.get(u)) {
        const s = byUid.get(lk.to);
        let cand;
        switch (lk.type) {
          case 'SS': cand = es.get(u) + lk.lag; break;
          case 'FF': cand = ef.get(u) + lk.lag - s.duration; break;
          case 'SF': cand = es.get(u) + lk.lag - s.duration; break;
          default:   cand = ef.get(u) + lk.lag;                 // FS
        }
        if (cand > es.get(lk.to)) es.set(lk.to, cand);
      }
    }
    const T = Math.max(0, ...leaves.map(l => ef.get(l.uid)));
    // backward pass — anchor floats to the network-driven finish so a lone
    // fixed-date milestone beyond the linked chain does not dilute the critical path
    let netT = 0;
    for (const l of leaves) if (adjIn.get(l.uid).length) netT = Math.max(netT, ef.get(l.uid));
    if (netT === 0) netT = T;
    for (const l of leaves) lf.set(l.uid, Math.max(netT, ef.get(l.uid)));
    for (let i = order.length - 1; i >= 0; i--) {
      const u = order[i], t = byUid.get(u);
      for (const lk of adjOut.get(u)) {
        const s = byUid.get(lk.to), sls = lf.get(lk.to) - s.duration;
        let cand;
        switch (lk.type) {
          case 'SS': cand = sls - lk.lag + t.duration; break;
          case 'FF': cand = lf.get(lk.to) - lk.lag; break;
          case 'SF': cand = lf.get(lk.to) - lk.lag + t.duration; break;
          default:   cand = sls - lk.lag;                       // FS
        }
        if (cand < lf.get(u)) lf.set(u, cand);
      }
      ls.set(u, lf.get(u) - t.duration);
    }
    // free float
    for (const l of leaves) {
      const u = l.uid; let ff = Infinity;
      for (const lk of adjOut.get(u)) {
        const s = byUid.get(lk.to);
        let slack;
        switch (lk.type) {
          case 'SS': slack = es.get(lk.to) - (es.get(u) + lk.lag); break;
          case 'FF': slack = ef.get(lk.to) - (ef.get(u) + lk.lag); break;
          case 'SF': slack = ef.get(lk.to) - (es.get(u) + lk.lag); break;
          default:   slack = es.get(lk.to) - (ef.get(u) + lk.lag);
        }
        if (slack < ff) ff = slack;
      }
      if (ff === Infinity) ff = Math.max(netT, ef.get(u)) - ef.get(u);
      const tf = ls.get(u) - es.get(u);
      l.cpm = {
        es: es.get(u), ef: ef.get(u), ls: ls.get(u), lf: lf.get(u),
        totalFloat: Math.round(tf * 100) / 100,
        freeFloat: Math.round(Math.max(0, ff) * 100) / 100,
        isCritical: tf < 1e-6
      };
    }
    // summary rollup (children appear after parents in outline order)
    for (let i = this.tasks.length - 1; i >= 0; i--) {
      const t = this.tasks[i];
      if (!t.isSummary) continue;
      let mes = Infinity, mef = -Infinity, mtf = Infinity, crit = false, wsum = 0, psum = 0;
      for (const c of t.children) {
        mes = Math.min(mes, c.cpm.es); mef = Math.max(mef, c.cpm.ef);
        mtf = Math.min(mtf, c.cpm.totalFloat); crit = crit || c.cpm.isCritical;
        wsum += Math.max(c.rollDur || c.duration, 0.001);
        psum += Math.max(c.rollDur || c.duration, 0.001) * c.percentComplete;
      }
      t.rollDur = mef - mes;
      t.duration = Math.round((mef - mes) * 100) / 100;
      t.percentComplete = wsum > 0 ? Math.round(psum / wsum * 10) / 10 : 0;
      t.cpm = { es: mes, ef: mef, ls: mes + mtf, lf: mef + mtf, totalFloat: mtf, freeFloat: mtf, isCritical: crit };
    }
    projectEndDay = T;
    return { ok: true, T, links };
  }
}

/* ---------------------------------------------------------------------
   EVM Engine
--------------------------------------------------------------------- */
class EVMCalculator {
  static compute(tasks, statusDay, baselineSet) {
    for (const t of tasks) {
      if (t.isSummary) continue;
      const bs = (baselineSet && t.blStart !== null) ? t.blStart : t.cpm.es;
      const bf = (baselineSet && t.blFinish !== null) ? t.blFinish : t.cpm.ef;
      const bd = bf - bs;
      let plan;
      if (statusDay <= bs) plan = 0;
      else if (statusDay >= bf) plan = 1;
      else plan = bd > 0 ? (statusDay - bs) / bd : 1;
      const bac = t.baselineCost || 0;
      const pv = bac * plan, ev = bac * (t.percentComplete / 100), ac = t.actualCost || 0;
      t.evm = {
        plannedPct: plan * 100, pv, ev, ac,
        cv: ev - ac, sv: ev - pv,
        cpi: ac > 0 ? ev / ac : null, spi: pv > 0 ? ev / pv : null
      };
    }
    for (let i = tasks.length - 1; i >= 0; i--) {
      const t = tasks[i];
      if (!t.isSummary) continue;
      let pv = 0, ev = 0, ac = 0, bac = 0, planW = 0, durW = 0;
      for (const c of t.children) {
        pv += c.evm.pv; ev += c.evm.ev; ac += c.evm.ac;
        bac += c.evm.bac !== undefined ? c.evm.bac : (c.baselineCost || 0);
        const w = Math.max(c.rollDur || c.duration, 0.001);
        planW += w * c.evm.plannedPct; durW += w;
      }
      t.evm = {
        bac, pv, ev, ac, cv: ev - ac, sv: ev - pv,
        cpi: ac > 0 ? ev / ac : null, spi: pv > 0 ? ev / pv : null,
        plannedPct: durW > 0 ? planW / durW : 0
      };
    }
  }
  static totals(tasks) {
    let pv = 0, ev = 0, ac = 0, bac = 0;
    for (const t of tasks) if (!t.isSummary) {
      pv += t.evm.pv; ev += t.evm.ev; ac += t.evm.ac; bac += t.baselineCost || 0;
    }
    return {
      bac, pv, ev, ac, cv: ev - ac, sv: ev - pv,
      cpi: ac > 0 ? ev / ac : null, spi: pv > 0 ? ev / pv : null,
      planPct: bac > 0 ? pv / bac * 100 : null, actPct: bac > 0 ? ev / bac * 100 : null
    };
  }
}

/* ---------------------------------------------------------------------
   Recalculate everything (called on every edit — no manual refresh)
--------------------------------------------------------------------- */
let lastLinks = [];
function recalcAll() {
  const res = new CPMCalculator(state.tasks).compute();
  if (!res.ok) return res;
  lastLinks = res.links;
  EVMCalculator.compute(state.tasks, isoToDay(state.statusDate), state.baselineSet);
  return res;
}

/* ---------------------------------------------------------------------
   Multi-baseline (3 slots แบบ MS Project)
   - t.bl = { 1:{s,f}, 2:{s,f}, 3:{s,f} } เก็บทุก slot
   - t.blStart / t.blFinish = ค่าของ slot ที่เลือก (state.activeBl)
     ให้โค้ดเดิม (EVM, Gantt, สถานะ, export) ใช้ต่อได้โดยไม่ต้องแก้
--------------------------------------------------------------------- */
function applyActiveBaseline() {
  if (!state.activeBl) state.activeBl = 1;
  let any = false;
  for (const t of state.tasks) {
    const b = t.bl ? t.bl[state.activeBl] : null;
    t.blStart = b ? b.s : null;
    t.blFinish = b ? b.f : null;
    if (b && !t.isSummary) any = true;
  }
  state.baselineSet = any;
}

function slotHasData(n) {
  return state.tasks.some(t => !t.isSummary && t.bl && t.bl[n]);
}

// ข้อมูลเก่าที่มีแค่ blStart/blFinish → ย้ายเข้า Baseline 1
function migrateBaselines() {
  if (!state.activeBl) state.activeBl = 1;
  for (const t of state.tasks) {
    if (!t.bl || typeof t.bl !== 'object') t.bl = {};
    if (t.blStart !== undefined && t.blStart !== null && !t.bl[1] && !t.bl[2] && !t.bl[3])
      t.bl[1] = { s: t.blStart, f: t.blFinish };
  }
  applyActiveBaseline();
}

function updateBlUI() {
  const sel = document.getElementById('blSel');
  if (!sel) return;
  for (const opt of sel.options)
    opt.textContent = `BL ${opt.value}${slotHasData(parseInt(opt.value, 10)) ? ' ✓' : ''}`;
  sel.value = String(state.activeBl || 1);
}

/* ---------------------------------------------------------------------
   Delay tracking status
--------------------------------------------------------------------- */
function taskStatus(t) {
  if (!state.baselineSet) return { cls: 'na', label: '—' };
  if (t.percentComplete >= 100) return { cls: 'done', label: 'เสร็จ' };
  const planPct = t.evm ? t.evm.plannedPct : 0;
  const finVar = t.blFinish !== null ? t.cpm.ef - t.blFinish : 0;
  if (t.percentComplete + 0.5 < planPct || finVar > 0.01) {
    const d = Math.max(finVar, 0);
    return { cls: 'late', label: d > 0.01 ? `ล่าช้า ${Math.round(d)} วัน` : 'ล่าช้า' };
  }
  return { cls: 'ok', label: 'ตามแผน' };
}

/* ---------------------------------------------------------------------
   Predecessor string parse / format   e.g. "303, 305SS+7, 12FS-1"
--------------------------------------------------------------------- */
function formatPreds(preds) {
  return preds.map(p => {
    let s = String(p.id);
    if (p.type !== 'FS' || p.lag) s += p.type;
    if (p.lag) s += (p.lag > 0 ? '+' : '') + p.lag;
    return s;
  }).join(', ');
}
function parsePreds(str) {
  const out = [];
  for (const tok of str.split(',').map(s => s.trim()).filter(Boolean)) {
    const m = tok.match(/^(\d+)\s*(FS|SS|FF|SF)?\s*([+-]\s*\d+(?:\.\d+)?)?$/i);
    if (!m) return { error: `รูปแบบไม่ถูกต้อง: "${tok}" (ตัวอย่าง: 303, 305SS+7)` };
    const id = parseInt(m[1], 10);
    if (!byUid.has(id)) return { error: `ไม่พบงาน UID ${id}` };
    out.push({ id, type: (m[2] || 'FS').toUpperCase(), lag: m[3] ? parseFloat(m[3].replace(/\s/g,'')) : 0 });
  }
  return { preds: out };
}

/* ---------------------------------------------------------------------
   Visible rows (collapse/expand)
--------------------------------------------------------------------- */
function computeVisible() {
  visibleRows = [];
  const walk = arr => {
    for (const t of arr) {
      visibleRows.push(t);
      if (t.children.length && !collapsed.has(t.uid)) walk(t.children);
    }
  };
  walk(state.tasks.filter(t => !t.parent));
}

/* ---------------------------------------------------------------------
   Table rendering
--------------------------------------------------------------------- */
function renderTable() {
  const rows = [];
  for (const t of visibleRows) {
    const cls = [t.isSummary ? 'summary' : '', t.cpm.isCritical ? 'critical' : '', t.uid === selectedUid ? 'selrow' : ''].join(' ').trim();
    const indent = (t.outlineLevel - 1) * 14;
    const tog = t.children.length
      ? `<span class="toggle" data-tog="${t.uid}">${collapsed.has(t.uid) ? '&#9654;' : '&#9660;'}</span>`
      : '<span class="toggle"></span>';
    const st = taskStatus(t);
    const editable = f => t.isSummary ? '' : ` editable" data-uid="${t.uid}" data-field="${f}`;
    rows.push(`<tr class="${cls}" data-uid="${t.uid}" draggable="true">
      <td class="num" style="color:var(--muted)">${t.uid}</td>
      <td title="${esc(t.wbs)}">${esc(t.wbs)}</td>
      <td class="c-name editable" data-uid="${t.uid}" data-field="name" title="${esc(t.name)}"><span style="display:inline-block;width:${indent}px"></span>${tog}${t.milestone ? '&#9670; ' : ''}${esc(t.name)}</td>
      <td class="num${editable('duration')}">${fmtNum(t.duration, t.duration % 1 ? 1 : 0)}${t.isSummary ? '' : '<span class="spin"><b data-spin="1" title="เพิ่ม 1 วัน">&#9650;</b><b data-spin="-1" title="ลด 1 วัน">&#9660;</b></span>'}</td>
      <td>${fmtDay(t.cpm.es)}${t.isSummary ? '' : `<span class="calBtn" data-cal="${t.uid}" title="เลือกวันเริ่มจากปฏิทิน">&#9662;</span>`}</td>
      <td>${fmtDay(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef)}</td>
      <td class="${t.isSummary ? '' : 'editable'}" ${t.isSummary ? '' : `data-uid="${t.uid}" data-field="predecessors"`} title="${esc(formatPreds(t.predecessors))}">${esc(formatPreds(t.predecessors))}</td>
      <td class="num${editable('percentComplete')}">${fmtNum(t.percentComplete, t.percentComplete % 1 ? 1 : 0)}</td>
      <td class="num" style="${(state.showCritical && t.cpm.isCritical) ? 'color:var(--red);font-weight:600' : ''}">${fmtNum(t.cpm.totalFloat, 0)}</td>
      <td class="num">${t.isSummary ? '' : fmtNum(t.cpm.freeFloat, 0)}</td>
      <td class="num${editable('baselineCost')}">${fmtMoney(t.isSummary ? t.evm.bac : t.baselineCost)}</td>
      <td class="num${editable('actualCost')}">${fmtMoney(t.isSummary ? t.evm.ac : t.actualCost)}</td>
      <td><span class="chip ${st.cls}">${st.label}</span></td>
    </tr>`);
  }
  document.getElementById('taskBody').innerHTML = rows.join('');
}

/* ---------------------------------------------------------------------
   Bar colors — CRD style
   Group of Task = navy เข้ม, Task = น้ำเงินอ่อนลงตามระดับ WBS,
   สีแดงเฉพาะเมื่อเปิดโหมด Critical Path
--------------------------------------------------------------------- */
const TASK_BLUES = ['#2A5CA8', '#4478BC', '#6194CE', '#83AFDC', '#A7C8E8'];
function barColor(t) {
  if (state.showCritical && t.cpm.isCritical) return '#D0342C';
  if (t.isSummary) return '#1B365D';
  return TASK_BLUES[Math.min(Math.max(t.outlineLevel - 2, 0), TASK_BLUES.length - 1)];
}

function applyCritUI() {
  const on = !!(state && state.showCritical);
  document.body.classList.toggle('show-crit', on);
  const b = document.getElementById('btnCritical');
  if (b) b.classList.toggle('toggled', on);
}

/* ---------------------------------------------------------------------
   Gantt rendering (SVG)
--------------------------------------------------------------------- */
function renderGantt() {
  const px = state.zoomPx || ZOOM_PX[state.zoom];
  const totalDays = projectEndDay + 40;
  const W = Math.ceil(totalDays * px);
  const H = visibleRows.length * ROW_H;
  const ps = fromISO(state.projectStart);

  /* ---- header ---- */
  let h1 = '', h2 = '', grid = '';
  let d = new Date(ps); d.setDate(1);
  while (d <= new Date(ps.getTime() + totalDays * DAY)) {
    const mStart = Math.max(0, Math.round((d - ps) / DAY));
    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    const mEnd = Math.min(totalDays, Math.round((next - ps) / DAY));
    const mw = (mEnd - mStart) * px;
    if (mw > 24) {
      h1 += `<text x="${(mStart + mEnd) / 2 * px}" y="15" text-anchor="middle" font-size="10.5" fill="#74747E">${THM[d.getMonth()]} ${String((d.getFullYear() + 543) % 100).padStart(2,'0')}</text>`;
    }
    grid += `<line x1="${mEnd * px}" y1="0" x2="${mEnd * px}" y2="${H}" stroke="#E9E9EF" stroke-width="1"/>`;
    h2 += `<line x1="${mEnd * px}" y1="0" x2="${mEnd * px}" y2="${HEAD_H}" stroke="#DBDBE3" stroke-width="1"/>`;
    d = next;
  }
  if (px >= 18) {
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(ps.getTime() + i * DAY);
      h2 += `<text x="${(i + 0.5) * px}" y="36" text-anchor="middle" font-size="9" fill="#9A9AA4">${dt.getDate()}</text>`;
      grid += `<line x1="${i * px}" y1="0" x2="${i * px}" y2="${H}" stroke="#F2F2F6" stroke-width="1"/>`;
    }
  } else if (px >= 4.5) {
    for (let i = 0; i <= totalDays; i += 7) {
      const dt = new Date(ps.getTime() + i * DAY);
      h2 += `<text x="${i * px + 2}" y="36" font-size="8.5" fill="#9A9AA4">${dt.getDate()}/${dt.getMonth() + 1}</text>`;
      grid += `<line x1="${i * px}" y1="0" x2="${i * px}" y2="${H}" stroke="#F4F4F8" stroke-width="1"/>`;
    }
  }
  document.getElementById('ganttHeader').innerHTML =
    `<svg width="${W}" height="${HEAD_H}">${h1}${h2}<line x1="0" y1="22" x2="${W}" y2="22" stroke="#E4E4EA"/></svg>`;

  /* ---- body ---- */
  const parts = [`<svg width="${W}" height="${H}">`];
  parts.push(`<defs><marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker></defs>`);
  // row stripes + grid
  for (let i = 0; i < visibleRows.length; i++) {
    if (visibleRows[i].isSummary)
      parts.push(`<rect x="0" y="${i * ROW_H}" width="${W}" height="${ROW_H}" fill="#FBFBFD"/>`);
    parts.push(`<line x1="0" y1="${(i + 1) * ROW_H}" x2="${W}" y2="${(i + 1) * ROW_H}" stroke="#F0F0F4"/>`);
  }
  parts.push(grid);

  const rowIdx = new Map();
  visibleRows.forEach((t, i) => rowIdx.set(t.uid, i));

  // dependency links
  if (state.showLinks) {
    for (const lk of lastLinks) {
      const a = rowIdx.get(lk.from), b = rowIdx.get(lk.to);
      if (a === undefined || b === undefined) continue;
      const f = byUid.get(lk.from), s = byUid.get(lk.to);
      const x1 = (lk.type === 'SS' || lk.type === 'SF' ? f.cpm.es : f.cpm.ef) * px;
      const y1 = a * ROW_H + ROW_H / 2;
      const x2 = s.cpm.es * px, y2 = b * ROW_H + ROW_H / 2;
      const mid = x1 + 8;
      parts.push(`<path d="M${x1},${y1} H${mid} V${y2} H${Math.max(mid, x2 - 3)}" fill="none" stroke="#9CA3AF" stroke-width="1" opacity="0.65" marker-end="url(#arr)"/>`);
    }
  }

  // status date + today markers
  const sdX = isoToDay(state.statusDate) * px;
  if (sdX >= 0 && sdX <= W) {
    parts.push(`<line x1="${sdX}" y1="0" x2="${sdX}" y2="${H}" stroke="#B45309" stroke-width="1.2" stroke-dasharray="4,3"/>`);
  }

  // bars
  for (let i = 0; i < visibleRows.length; i++) {
    const t = visibleRows[i];
    const x = t.cpm.es * px, w = Math.max((t.cpm.ef - t.cpm.es) * px, 2);
    const yC = i * ROW_H + ROW_H / 2;
    const tip = `<title>${esc(t.wbs)} ${esc(t.name)}\n${fmtDay(t.cpm.es)} – ${fmtDay(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef)}  (${t.duration} วัน)\nTF ${t.cpm.totalFloat} | ${t.percentComplete}% เสร็จ</title>`;
    if (t.milestone || (!t.isSummary && t.duration === 0)) {
      parts.push(`<g>${tip}<path d="M${x},${yC - 7} L${x + 7},${yC} L${x},${yC + 7} L${x - 7},${yC} Z" fill="${barColor(t)}"/></g>`);
      continue;
    }
    if (t.isSummary) {
      // same bar size as tasks — differs only by color (CRD dark navy)
      parts.push(`<g>${tip}<rect x="${x}" y="${yC - 8}" width="${w}" height="15" rx="3" fill="${barColor(t)}"/>`);
      if (t.percentComplete > 0)
        parts.push(`<rect x="${x}" y="${yC - 8}" width="${w * Math.min(t.percentComplete, 100) / 100}" height="15" rx="3" fill="#000" opacity="0.30"/>`);
      parts.push(`</g>`);
      // baseline for summary
      if (state.baselineSet) {
        const bls = Math.min(...leavesUnder(t, []).map(l => l.blStart).filter(v => v !== null));
        const blf = Math.max(...leavesUnder(t, []).map(l => l.blFinish).filter(v => v !== null));
        if (isFinite(bls) && isFinite(blf))
          parts.push(`<rect x="${bls * px}" y="${yC + 8.5}" width="${Math.max((blf - bls) * px, 2)}" height="3.5" rx="1.5" fill="#C2C2CC"/>`);
      }
      continue;
    }
    const fill = barColor(t);
    parts.push(`<g>${tip}<rect x="${x}" y="${yC - 8}" width="${w}" height="15" rx="3" fill="${fill}" opacity="0.88"/>`);
    if (t.percentComplete > 0)
      parts.push(`<rect x="${x}" y="${yC - 8}" width="${w * Math.min(t.percentComplete, 100) / 100}" height="15" rx="3" fill="#000" opacity="0.30"/>`);
    parts.push(`</g>`);
    if (state.baselineSet && t.blStart !== null)
      parts.push(`<rect x="${t.blStart * px}" y="${yC + 8.5}" width="${Math.max((t.blFinish - t.blStart) * px, 2)}" height="3.5" rx="1.5" fill="#C2C2CC"/>`);
  }
  parts.push('</svg>');
  document.getElementById('ganttBody').innerHTML = parts.join('');
}

/* ---------------------------------------------------------------------
   Column widths — drag resize ที่หัวตาราง + shrink-to-fit ข้อความในเซลล์
   (ทุกคอลัมน์ ยกเว้นคอลัมน์ "ชื่องาน")
--------------------------------------------------------------------- */
const NAME_COL = 2;
const COLW_KEY = 'crd-planner-colw-v1';

function fitCellText(colIdx) {
  const rows = document.querySelectorAll('#taskTable tr');
  let cells = [];
  for (const r of rows) {
    for (let i = 0; i < r.cells.length; i++) {
      if (i === NAME_COL || (colIdx !== undefined && i !== colIdx)) continue;
      const c = r.cells[i];
      if (c.style.fontSize) c.style.fontSize = '';
      cells.push(c);
    }
  }
  // ลดขนาดฟอนต์เป็นรอบๆ (อ่านทั้งชุดก่อนแล้วค่อยเขียน เพื่อลด layout thrashing)
  for (let pass = 0; pass < 3 && cells.length; pass++) {
    const shrink = [];
    for (const c of cells) {
      const sw = c.scrollWidth, cw = c.clientWidth;
      if (sw > cw && cw > 0) shrink.push([c, cw / sw]);
    }
    cells = [];
    for (const [c, ratio] of shrink) {
      const cur = parseFloat(c.style.fontSize) || (c.tagName === 'TH' ? 11 : 12);
      const next = Math.max(6, cur * ratio - 0.2);
      c.style.fontSize = next + 'px';
      if (next > 6) cells.push(c);
    }
  }
}

function wireColResize() {
  const cols = document.querySelectorAll('#taskTable colgroup col');
  try {
    const saved = JSON.parse(localStorage.getItem(COLW_KEY) || 'null');
    if (Array.isArray(saved)) saved.forEach((w, i) => { if (w > 0 && cols[i]) cols[i].style.width = w + 'px'; });
  } catch (e) { /* ignore */ }
  document.querySelectorAll('#taskTable thead th').forEach((th, i) => {
    const grip = document.createElement('span');
    grip.className = 'colgrip';
    grip.title = 'ลากเพื่อปรับความกว้างคอลัมน์';
    grip.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX, startW = cols[i].getBoundingClientRect().width;
      grip.classList.add('dragging');
      document.body.classList.add('col-resizing');
      let raf = null;
      const move = ev => {
        cols[i].style.width = Math.max(30, startW + ev.clientX - startX) + 'px';
        if (!raf) raf = requestAnimationFrame(() => { raf = null; fitCellText(i); });
      };
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        grip.classList.remove('dragging');
        document.body.classList.remove('col-resizing');
        fitCellText(i);
        try { localStorage.setItem(COLW_KEY, JSON.stringify([...cols].map(c => Math.round(c.getBoundingClientRect().width)))); } catch (e) { /* quota */ }
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
    th.appendChild(grip);
  });
}
