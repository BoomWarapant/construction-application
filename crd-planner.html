function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const slim = {
      projectStart: state.projectStart, statusDate: state.statusDate,
      baselineSet: state.baselineSet, activeBl: state.activeBl || 1, zoom: state.zoom, zoomPx: state.zoomPx || null, showLinks: state.showLinks,
      showCritical: !!state.showCritical, evmVisible: state.evmVisible, projName: state.projName,
      collapsed: [...collapsed],
      tasks: state.tasks.map(t => ({
        uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
        duration: t.isSummary ? 0 : t.duration, milestone: t.milestone,
        predecessors: t.predecessors, percentComplete: t.isSummary ? 0 : t.percentComplete,
        baselineCost: t.baselineCost, actualCost: t.actualCost,
        snet: t.snet, blStart: t.blStart, blFinish: t.blFinish, bl: t.bl || {}
      }))
    };
    try { localStorage.setItem(STORE_KEY, JSON.stringify(slim)); } catch (e) { /* quota */ }
  }, 400);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.tasks || !s.tasks.length) return null;
    collapsed = new Set(s.collapsed || []);
    return s;
  } catch (e) { return null; }
}

/* ---------------------------------------------------------------------
   Undo / Redo  (snapshot-based)
--------------------------------------------------------------------- */
const UNDO_LIMIT = 60;
let undoStack = [], redoStack = [];

function snapshot() {
  return JSON.stringify({
    projectStart: state.projectStart, statusDate: state.statusDate,
    baselineSet: state.baselineSet, activeBl: state.activeBl || 1, projName: state.projName,
    tasks: state.tasks.map(t => ({
      uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
      duration: t.isSummary ? 0 : t.duration, milestone: t.milestone,
      predecessors: t.predecessors, percentComplete: t.isSummary ? 0 : t.percentComplete,
      baselineCost: t.baselineCost, actualCost: t.actualCost,
      snet: t.snet, blStart: t.blStart, blFinish: t.blFinish, bl: t.bl || {}
    }))
  });
}

// push `before` onto the undo stack only if the current state differs from it
function commitUndo(before) {
  if (snapshot() === before) return;
  undoStack.push(before);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack.length = 0;
  updateUndoButtons();
}

function restoreSnapshot(json) {
  const s = JSON.parse(json);
  state.projectStart = s.projectStart; state.statusDate = s.statusDate;
  state.baselineSet = s.baselineSet; state.activeBl = s.activeBl || 1; state.projName = s.projName;
  state.tasks = s.tasks;
  selectedUid = null;
  buildHierarchy();
  migrateBaselines();
  updateBlUI();
  recomputeWbs();
  recalcAll();
  document.getElementById('projName').textContent = state.projName;
  document.getElementById('statusDate').value = state.statusDate;
  renderAll();
  scheduleSave();
  updateUndoButtons();
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  restoreSnapshot(undoStack.pop());
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  restoreSnapshot(redoStack.pop());
}

function updateUndoButtons() {
  document.getElementById('btnUndo').disabled = !undoStack.length;
  document.getElementById('btnRedo').disabled = !redoStack.length;
}

/* ---------------------------------------------------------------------
   Editing
--------------------------------------------------------------------- */
function beginEdit(td) {
  if (td.querySelector('input')) return;
  const uid = parseInt(td.dataset.uid, 10), field = td.dataset.field;
  const t = byUid.get(uid);
  if (!t) return;
  let cur;
  switch (field) {
    case 'name': cur = t.name; break;
    case 'duration': cur = t.duration; break;
    case 'predecessors': cur = formatPreds(t.predecessors); break;
    case 'percentComplete': cur = t.percentComplete; break;
    case 'baselineCost': cur = t.baselineCost; break;
    case 'actualCost': cur = t.actualCost; break;
  }
  td.dataset.orig = td.innerHTML;
  td.innerHTML = `<input class="cellEdit" value="${esc(cur)}">`;
  const inp = td.querySelector('input');
  inp.focus(); inp.select();
  let done = false;
  const finish = commit => {
    if (done) return; done = true;
    if (commit) applyEdit(t, field, inp.value);
    else renderAll();
  };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') finish(false);
  });
  inp.addEventListener('blur', () => finish(true));
}

function applyEdit(t, field, valStr) {
  const before = snapshot();
  const prev = {
    name: t.name, duration: t.duration, predecessors: t.predecessors,
    percentComplete: t.percentComplete, baselineCost: t.baselineCost, actualCost: t.actualCost
  };
  const num = parseFloat(String(valStr).replace(/,/g, ''));
  switch (field) {
    case 'name':
      if (valStr.trim()) t.name = valStr.trim();
      break;
    case 'duration':
      if (isFinite(num) && num >= 0) { t.duration = Math.round(num * 100) / 100; t.milestone = t.duration === 0; }
      else { alert('ระยะเวลาต้องเป็นตัวเลข 0 ขึ้นไป'); }
      break;
    case 'percentComplete':
      if (isFinite(num)) t.percentComplete = Math.min(100, Math.max(0, num));
      else alert('% เสร็จต้องเป็นตัวเลข 0–100');
      break;
    case 'baselineCost':
      if (isFinite(num) && num >= 0) t.baselineCost = num; else alert('งบประมาณต้องเป็นตัวเลข');
      break;
    case 'actualCost':
      if (isFinite(num) && num >= 0) t.actualCost = num; else alert('ต้นทุนจริงต้องเป็นตัวเลข');
      break;
    case 'predecessors': {
      const r = parsePreds(valStr);
      if (r.error) { alert(r.error); break; }
      if (r.preds.some(p => p.id === t.uid)) { alert('งานอ้างอิงตัวเองไม่ได้'); break; }
      t.predecessors = r.preds;
      break;
    }
  }
  const res = recalcAll();
  if (!res.ok) {
    alert('พบ Circular Dependency — ยกเลิกการแก้ไข\n\nงานที่อยู่ในวงจร:\n' + res.cycle.slice(0, 12).join('\n') + (res.cycle.length > 12 ? `\n…และอีก ${res.cycle.length - 12} งาน` : ''));
    Object.assign(t, prev);
    recalcAll();
  }
  commitUndo(before);
  renderAll();
  scheduleSave();
}

/* ---------------------------------------------------------------------
   Import / Export
--------------------------------------------------------------------- */
function download(name, text, type = 'application/json') {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type }));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildJSONText() {
  const out = {
    app: 'crd-planner', version: 1,
    projectStart: state.projectStart, statusDate: state.statusDate,
    baselineSet: state.baselineSet, activeBl: state.activeBl || 1, projName: state.projName,
    tasks: state.tasks.map(t => ({
      uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
      duration: t.duration, milestone: t.milestone,
      start: toISO(d2date(t.cpm.es)), finish: toISO(d2date(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef)),
      predecessors: t.predecessors, percentComplete: t.percentComplete,
      baselineCost: t.baselineCost, actualCost: t.actualCost, isSummary: t.isSummary,
      baselineStart: t.blStart !== null ? toISO(d2date(t.blStart)) : null,
      baselineFinish: t.blFinish !== null ? toISO(d2date(t.blFinish)) : null,
      bl: t.bl || {}, snet: t.snet, cpm_data: t.cpm, evm_data: t.evm
    }))
  };
  return JSON.stringify(out, null, 1);
}

function buildProjectXML() {
  const typeNum = { FF: '0', FS: '1', SF: '2', SS: '3' };
  const x = [];
  x.push('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>');
  x.push('<Project xmlns="http://schemas.microsoft.com/project">');
  x.push(`<Title>${esc(state.projName)}</Title>`);
  x.push(`<StartDate>${state.projectStart}T08:00:00</StartDate>`);
  x.push('<Tasks>');
  x.push(`<Task><UID>0</UID><ID>0</ID><Name>${esc(state.projName)}</Name><OutlineLevel>0</OutlineLevel><WBS>0</WBS><Summary>1</Summary></Task>`);
  state.tasks.forEach((t, i) => {
    const parts = [
      `<UID>${t.uid}</UID><ID>${i + 1}</ID><Name>${esc(t.name)}</Name>`,
      `<OutlineLevel>${t.outlineLevel}</OutlineLevel><WBS>${esc(t.wbs)}</WBS>`,
      `<Milestone>${t.milestone ? 1 : 0}</Milestone><Summary>${t.isSummary ? 1 : 0}</Summary>`,
      `<Duration>PT${Math.round(t.duration * 8)}H0M0S</Duration>`,
      `<Start>${toISO(d2date(t.cpm.es))}T08:00:00</Start>`,
      `<Finish>${toISO(d2date(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef))}T17:00:00</Finish>`,
      `<PercentComplete>${Math.round(t.percentComplete)}</PercentComplete>`,
      `<Cost>${Math.round((t.isSummary ? 0 : t.baselineCost) * 100)}</Cost>`
    ];
    for (const p of t.predecessors)
      parts.push(`<PredecessorLink><PredecessorUID>${p.id}</PredecessorUID><Type>${typeNum[p.type] || '1'}</Type><LinkLag>${Math.round((p.lag || 0) * 4800)}</LinkLag><LagFormat>7</LagFormat></PredecessorLink>`);
    x.push(`<Task>${parts.join('')}</Task>`);
  });
  x.push('</Tasks>');
  x.push('</Project>');
  return x.join('\n');
}

const SAVE_MIME = {
  xml: 'application/xml',
  json: 'application/json',
  xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
};

function buildFileFor(ext) {
  if (ext === 'json') return new Blob([buildJSONText()], { type: SAVE_MIME.json });
  if (ext === 'xlsx') return buildXlsxBlob();
  return new Blob([buildProjectXML()], { type: SAVE_MIME.xml });
}

async function saveAsFile() {
  const base = `crd-plan-${state.statusDate}`;
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: base + '.xml',
        types: [
          { description: 'MS Project XML', accept: { 'application/xml': ['.xml'] } },
          { description: 'Excel Workbook (XLSX)', accept: { [SAVE_MIME.xlsx]: ['.xlsx'] } },
          { description: 'JSON', accept: { 'application/json': ['.json'] } }
        ]
      });
      const m = handle.name.match(/\.(xml|xlsx|json)$/i);
      const ext = m ? m[1].toLowerCase() : 'xml';
      const w = await handle.createWritable();
      await w.write(buildFileFor(ext));
      await w.close();
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return; // ผู้ใช้กดยกเลิก
    }
  }
  // เบราว์เซอร์ที่ไม่รองรับ File System Access API
  const fmt = (prompt('พิมพ์รูปแบบไฟล์ที่ต้องการบันทึก: xml / xlsx / json', 'xml') || '').trim().toLowerCase();
  if (!fmt) return;
  if (!['xml', 'xlsx', 'json'].includes(fmt)) { alert('รูปแบบไม่ถูกต้อง — เลือกได้เฉพาะ xml, xlsx, json'); return; }
  download(base + '.' + fmt, buildFileFor(fmt), SAVE_MIME[fmt]);
}

function importJSON(text) {
  let s;
  try { s = JSON.parse(text); } catch (e) { alert('ไฟล์ JSON ไม่ถูกต้อง'); return; }
  if (!s.tasks || !Array.isArray(s.tasks)) { alert('ไม่พบข้อมูล tasks ในไฟล์'); return; }
  const before = snapshot();
  state.projectStart = s.projectStart || state.projectStart;
  state.statusDate = s.statusDate || state.statusDate;
  state.baselineSet = !!s.baselineSet;
  state.activeBl = s.activeBl || 1;
  state.projName = s.projName || state.projName;
  state.tasks = s.tasks.map(t => ({
    uid: t.uid, wbs: t.wbs || '', outlineLevel: t.outlineLevel || 1, name: t.name || '',
    duration: t.duration || 0, milestone: !!t.milestone,
    predecessors: t.predecessors || [], percentComplete: t.percentComplete || 0,
    baselineCost: t.baselineCost || 0, actualCost: t.actualCost || 0,
    snet: t.snet !== undefined ? t.snet : (t.start ? daysBetween(state.projectStart, t.start) : 0),
    blStart: t.blStart !== undefined ? t.blStart : (t.baselineStart ? daysBetween(state.projectStart, t.baselineStart) : null),
    blFinish: t.blFinish !== undefined ? t.blFinish : (t.baselineFinish ? daysBetween(state.projectStart, t.baselineFinish) : null),
    bl: (t.bl && typeof t.bl === 'object') ? t.bl : {}
  }));
  afterDataReplaced();
  commitUndo(before);
}

function importXML(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  if (doc.querySelector('parsererror')) { alert('ไฟล์ XML ไม่ถูกต้อง'); return; }
  const typeMap = { '0': 'FF', '1': 'FS', '2': 'SF', '3': 'SS' };
  const val = (el, tag) => { const n = el.getElementsByTagName(tag)[0]; return n ? n.textContent : null; };
  const parseDur = s => { const m = s && s.match(/PT(\d+)H/); return m ? Math.round(parseInt(m[1],10) / 8 * 100) / 100 : 0; };
  const taskEls = [...doc.getElementsByTagName('Task')];
  const raw = [];
  for (const el of taskEls) {
    const name = val(el, 'Name');
    const uid = parseInt(val(el, 'UID') || '-1', 10);
    const lvl = parseInt(val(el, 'OutlineLevel') || '0', 10);
    if (!name || uid <= 0 || lvl < 1) continue;
    const preds = [...el.getElementsByTagName('PredecessorLink')].map(p => ({
      id: parseInt(val(p, 'PredecessorUID'), 10),
      type: typeMap[val(p, 'Type')] || 'FS',
      lag: val(p, 'LinkLag') ? Math.round(parseInt(val(p, 'LinkLag'),10) / 4800 * 100) / 100 : 0
    }));
    raw.push({
      uid, wbs: val(el, 'WBS') || '', outlineLevel: lvl, name,
      duration: parseDur(val(el, 'Duration')),
      start: (val(el, 'Start') || '').substring(0, 10),
      milestone: val(el, 'Milestone') === '1',
      cost: val(el, 'Cost') ? Math.round(parseFloat(val(el, 'Cost'))) / 100 : 0,
      percentComplete: parseInt(val(el, 'PercentComplete') || '0', 10),
      predecessors: preds
    });
  }
  if (!raw.length) { alert('ไม่พบรายการงานในไฟล์ XML'); return; }
  const before = snapshot();
  const minStart = raw.reduce((m, t) => (t.start && t.start < m) ? t.start : m, '9999-12-31');
  state.projectStart = minStart;
  state.projName = val(doc.documentElement, 'Title') || state.projName;
  state.baselineSet = false;
  state.activeBl = 1;
  state.tasks = raw.map(t => ({
    uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
    duration: t.duration, milestone: t.milestone,
    predecessors: t.predecessors, percentComplete: t.percentComplete || 0,
    baselineCost: t.cost || 0, actualCost: 0,
    snet: t.start ? daysBetween(minStart, t.start) : 0, blStart: null, blFinish: null, bl: {}
  }));
  afterDataReplaced();
  commitUndo(before);
}

/* ---------------------------------------------------------------------
   XLSX import / export (self-contained, no external library)
   - export: minimal xlsx package zipped with stored (uncompressed) entries
   - import: reads zip central directory; deflated entries are inflated
     with DecompressionStream('deflate-raw')
--------------------------------------------------------------------- */
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c;
  }
  return t;
})();
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function buildZip(files) {  // files: [[name, xmlText], ...] → Blob (zip, stored entries)
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  for (const [name, text] of files) {
    const nameB = enc.encode(name), data = enc.encode(text), crc = crc32(data);
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true); lh.setUint16(6, 0x0800, true);
    lh.setUint32(14, crc, true); lh.setUint32(18, data.length, true); lh.setUint32(22, data.length, true);
    lh.setUint16(26, nameB.length, true);
    parts.push(new Uint8Array(lh.buffer), nameB, data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true); ch.setUint16(4, 20, true); ch.setUint16(6, 20, true); ch.setUint16(8, 0x0800, true);
    ch.setUint32(16, crc, true); ch.setUint32(20, data.length, true); ch.setUint32(24, data.length, true);
    ch.setUint16(28, nameB.length, true); ch.setUint32(42, offset, true);
    central.push(new Uint8Array(ch.buffer), nameB);
    offset += 30 + nameB.length + data.length;
  }
  const cdSize = central.reduce((s, p) => s + p.length, 0);
  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32(0, 0x06054b50, true); eocd.setUint16(8, files.length, true); eocd.setUint16(10, files.length, true);
  eocd.setUint32(12, cdSize, true); eocd.setUint32(16, offset, true);
  return new Blob([...parts, ...central, new Uint8Array(eocd.buffer)]);
}

function unzipEntries(buf) {
  const u8 = new Uint8Array(buf), dv = new DataView(buf);
  let e = -1;
  for (let i = buf.byteLength - 22; i >= Math.max(0, buf.byteLength - 22 - 65535); i--)
    if (dv.getUint32(i, true) === 0x06054b50) { e = i; break; }
  if (e < 0) throw new Error('ไม่ใช่ไฟล์ xlsx/zip');
  const count = dv.getUint16(e + 10, true);
  const entries = {};
  let off = dv.getUint32(e + 16, true);
  const td = new TextDecoder();
  for (let i = 0; i < count; i++) {
    if (dv.getUint32(off, true) !== 0x02014b50) break;
    const method = dv.getUint16(off + 10, true);
    const csize = dv.getUint32(off + 20, true);
    const nlen = dv.getUint16(off + 28, true), elen = dv.getUint16(off + 30, true), clen = dv.getUint16(off + 32, true);
    const lho = dv.getUint32(off + 42, true);
    entries[td.decode(u8.subarray(off + 46, off + 46 + nlen))] = { method, csize, lho };
    off += 46 + nlen + elen + clen;
  }
  return { u8, dv, entries };
}

async function zipReadText(z, name) {
  const ent = z.entries[name];
  if (!ent) return null;
  const dataOff = ent.lho + 30 + z.dv.getUint16(ent.lho + 26, true) + z.dv.getUint16(ent.lho + 28, true);
  const data = z.u8.subarray(dataOff, dataOff + ent.csize);
  if (ent.method === 0) return new TextDecoder().decode(data);
  if (ent.method !== 8) throw new Error('รูปแบบบีบอัดในไฟล์ไม่รองรับ');
  const ab = await new Response(new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate-raw'))).arrayBuffer();
  return new TextDecoder().decode(ab);
}

const XLSX_HEADS = ['UID', 'WBS', 'Level', 'Name', 'Duration (days)', 'Milestone', 'Predecessors', '% Complete', 'Start', 'Finish', 'Baseline Cost', 'Actual Cost', 'Baseline Start', 'Baseline Finish'];

function buildXlsxBlob() {
  const XM = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  const colL = i => { let s = ''; i++; while (i > 0) { s = String.fromCharCode(65 + (i - 1) % 26) + s; i = Math.floor((i - 1) / 26); } return s; };
  const widths = [6, 10, 6, 45, 13, 9, 16, 11, 11, 11, 13, 13, 13, 13];
  const numCol = new Set([0, 2, 4, 5, 7, 10, 11]);
  const xrows = ['<row r="1">' + XLSX_HEADS.map((h, j) => `<c r="${colL(j)}1" t="inlineStr" s="1"><is><t>${esc(h)}</t></is></c>`).join('') + '</row>'];
  state.tasks.forEach((t, i) => {
    const vals = [t.uid, t.wbs, t.outlineLevel, t.name, t.duration, t.milestone ? 1 : 0,
      formatPreds(t.predecessors), Math.round(t.percentComplete * 100) / 100,
      toISO(d2date(t.cpm.es)), toISO(d2date(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef)),
      t.baselineCost, t.actualCost,
      t.blStart !== null ? toISO(d2date(t.blStart)) : '', t.blFinish !== null ? toISO(d2date(t.blFinish)) : ''];
    const rn = i + 2;
    xrows.push('<row r="' + rn + '">' + vals.map((v, j) => {
      if (v === '' || v === null || v === undefined) return '';
      if (numCol.has(j)) return `<c r="${colL(j)}${rn}"><v>${v}</v></c>`;
      return `<c r="${colL(j)}${rn}" t="inlineStr"><is><t xml:space="preserve">${esc(String(v))}</t></is></c>`;
    }).join('') + '</row>');
  });
  const sheet = XM + '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    + '<cols>' + widths.map((w, j) => `<col min="${j + 1}" max="${j + 1}" width="${w}" customWidth="1"/>`).join('') + '</cols>'
    + '<sheetData>' + xrows.join('') + '</sheetData></worksheet>';
  const styles = XM + '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    + '<fonts count="2"><font><sz val="11"/><name val="Tahoma"/></font><font><b/><sz val="11"/><name val="Tahoma"/></font></fonts>'
    + '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>'
    + '<borders count="1"><border/></borders>'
    + '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
    + '<cellXfs count="2"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs>'
    + '</styleSheet>';
  const files = [
    ['[Content_Types].xml', XM + '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>'],
    ['_rels/.rels', XM + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>'],
    ['xl/workbook.xml', XM + '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Plan" sheetId="1" r:id="rId1"/></sheets></workbook>'],
    ['xl/_rels/workbook.xml.rels', XM + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>'],
    ['xl/styles.xml', styles],
    ['xl/worksheets/sheet1.xml', sheet]
  ];
  return buildZip(files);
}

function sheetToRows(xmlText, shared) {  // → array of rows, each row = array of cell values
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('worksheet XML ไม่ถูกต้อง');
  const rows = [];
  for (const rowEl of [...doc.getElementsByTagName('row')]) {
    const r = [];
    let auto = 0;
    for (const c of [...rowEl.getElementsByTagName('c')]) {
      const ref = c.getAttribute('r');
      let idx = auto;
      if (ref) {
        idx = 0;
        for (const ch of ref.replace(/\d+/g, '')) idx = idx * 26 + (ch.toUpperCase().charCodeAt(0) - 64);
        idx--;
      }
      auto = idx + 1;
      const t = c.getAttribute('t');
      let v = null;
      if (t === 'inlineStr') {
        const is = c.getElementsByTagName('is')[0];
        v = is ? is.textContent : '';
      } else {
        const vEl = c.getElementsByTagName('v')[0];
        if (vEl) {
          const txt = vEl.textContent;
          if (t === 's') v = shared[parseInt(txt, 10)] !== undefined ? shared[parseInt(txt, 10)] : '';
          else if (t === 'b') v = txt === '1';
          else if (t === 'str' || t === 'e') v = txt;
          else v = parseFloat(txt);
        }
      }
      if (idx >= 0) r[idx] = v;
    }
    rows.push(r);
  }
  return rows;
}

function xlsxDate(v) {  // Excel serial | ISO | dd/mm/yyyy (ค.ศ./พ.ศ.) → 'YYYY-MM-DD' | null
  if (v === undefined || v === null || v === '') return null;
  if (typeof v === 'number' && isFinite(v)) return v > 59 ? toISO(new Date(Math.round((v - 25569) * DAY) + 12 * 3600000)) : null;
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (!m) {
    const d = s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/);
    if (d) m = [null, d[3], d[2], d[1]];
  }
  if (!m) return null;
  let y = parseInt(m[1], 10);
  if (y > 2400) y -= 543;
  return `${y}-${String(parseInt(m[2], 10)).padStart(2, '0')}-${String(parseInt(m[3], 10)).padStart(2, '0')}`;
}

function parsePredsLoose(str) {  // เหมือน parsePreds แต่ไม่เช็ค byUid (ยังไม่ได้สร้างตอน import)
  const out = [];
  for (const tok of String(str).split(/[,;]/).map(s => s.trim()).filter(Boolean)) {
    const m = tok.match(/^(\d+)\s*(FS|SS|FF|SF)?\s*([+-]\s*\d+(?:\.\d+)?)?$/i);
    if (!m) continue;
    out.push({ id: parseInt(m[1], 10), type: (m[2] || 'FS').toUpperCase(), lag: m[3] ? parseFloat(m[3].replace(/\s/g, '')) : 0 });
  }
  return out;
}

async function importXLSX(buf) {
  if (typeof DecompressionStream === 'undefined') { alert('เบราว์เซอร์นี้ไม่รองรับการอ่านไฟล์ .xlsx (ต้องใช้เบราว์เซอร์รุ่นใหม่ เช่น Chrome / Edge)'); return; }
  let rows;
  try {
    const z = unzipEntries(buf);
    const sheetName = z.entries['xl/worksheets/sheet1.xml'] ? 'xl/worksheets/sheet1.xml'
      : Object.keys(z.entries).find(n => /^xl\/worksheets\/[^\/]+\.xml$/.test(n));
    if (!sheetName) { alert('ไม่พบ worksheet ในไฟล์ .xlsx'); return; }
    const shared = [];
    const sst = await zipReadText(z, 'xl/sharedStrings.xml');
    if (sst) for (const si of [...new DOMParser().parseFromString(sst, 'application/xml').getElementsByTagName('si')]) shared.push(si.textContent);
    rows = sheetToRows(await zipReadText(z, sheetName), shared);
  } catch (err) { alert('อ่านไฟล์ .xlsx ไม่สำเร็จ: ' + err.message); return; }

  // หาแถวหัวตาราง แล้ว map ชื่อคอลัมน์ → index (รองรับหัวตารางอังกฤษ/ไทย)
  const norm = h => String(h === undefined || h === null ? '' : h).toLowerCase().replace(/[^a-z%ก-๙]/g, '');
  const keyByHead = {
    uid: 'uid', id: 'uid', wbs: 'wbs', level: 'level', outlinelevel: 'level', 'ระดับ': 'level',
    name: 'name', taskname: 'name', 'ชื่องาน': 'name',
    duration: 'dur', durationdays: 'dur', 'ระยะเวลา': 'dur', 'ระยะเวลาวัน': 'dur',
    milestone: 'ms', predecessors: 'preds', 'งานก่อนหน้า': 'preds',
    '%complete': 'pct', percentcomplete: 'pct', pctcomplete: 'pct', 'ความคืบหน้า': 'pct', '%ความคืบหน้า': 'pct',
    start: 'start', 'เริ่ม': 'start', finish: 'finish', 'เสร็จ': 'finish',
    baselinecost: 'cost', cost: 'cost', 'งบประมาณ': 'cost', actualcost: 'actual', 'ต้นทุนจริง': 'actual',
    baselinestart: 'blstart', baselinefinish: 'blfinish'
  };
  let headIdx = -1, cols = {};
  for (let i = 0; i < rows.length && headIdx < 0; i++) {
    const c = {};
    (rows[i] || []).forEach((h, j) => { const k = keyByHead[norm(h)]; if (k && c[k] === undefined) c[k] = j; });
    if (c.name !== undefined) { headIdx = i; cols = c; }
  }
  if (headIdx < 0) { alert('ไม่พบแถวหัวตารางในไฟล์ .xlsx (อย่างน้อยต้องมีคอลัมน์ Name / ชื่องาน)'); return; }

  const raw = [];
  for (let i = headIdx + 1; i < rows.length; i++) {
    const r = rows[i] || [];
    const get = k => (cols[k] === undefined ? undefined : r[cols[k]]);
    const name = String(get('name') === undefined || get('name') === null ? '' : get('name'));
    if (!name.trim()) continue;
    const uidV = parseInt(get('uid'), 10);
    const durV = parseFloat(get('dur'));
    const pctV = parseFloat(get('pct'));
    const msV = get('ms');
    raw.push({
      uid: (isFinite(uidV) && uidV > 0) ? uidV : null,
      wbs: String(get('wbs') === undefined || get('wbs') === null ? '' : get('wbs')).trim(),
      outlineLevel: Math.max(1, parseInt(get('level'), 10) || 1), name,
      duration: (isFinite(durV) && durV > 0) ? durV : 0,
      milestone: msV === true || msV === 1 || /^(1|true|yes|y|ใช่)$/i.test(String(msV === undefined ? '' : msV).trim()),
      predsText: get('preds') === undefined || get('preds') === null ? '' : String(get('preds')),
      percentComplete: isFinite(pctV) ? Math.min(100, Math.max(0, pctV)) : 0,
      start: xlsxDate(get('start')),
      cost: parseFloat(get('cost')) || 0, actual: parseFloat(get('actual')) || 0,
      blStart: xlsxDate(get('blstart')), blFinish: xlsxDate(get('blfinish'))
    });
  }
  if (!raw.length) { alert('ไม่พบรายการงานในไฟล์ .xlsx'); return; }

  // UID ที่ว่าง/ซ้ำ → ออกเลขใหม่ต่อจากค่าสูงสุด; ตัด predecessor ที่ชี้ไป UID ที่ไม่มีจริง
  let maxUid = raw.reduce((m, t) => Math.max(m, t.uid || 0), 0);
  const seen = new Set();
  for (const t of raw) {
    if (t.uid === null || seen.has(t.uid)) t.uid = ++maxUid;
    seen.add(t.uid);
  }
  const before = snapshot();
  const starts = raw.map(t => t.start).filter(Boolean);
  const minStart = starts.length ? starts.reduce((m, s) => (s < m ? s : m)) : state.projectStart;
  state.projectStart = minStart;
  state.baselineSet = raw.some(t => t.blStart);
  state.activeBl = 1;
  state.tasks = raw.map(t => ({
    uid: t.uid, wbs: t.wbs, outlineLevel: t.outlineLevel, name: t.name,
    duration: t.duration, milestone: t.milestone,
    predecessors: parsePredsLoose(t.predsText).filter(p => seen.has(p.id)),
    percentComplete: t.percentComplete,
    baselineCost: t.cost, actualCost: t.actual,
    snet: t.start ? daysBetween(minStart, t.start) : 0,
    blStart: t.blStart ? daysBetween(minStart, t.blStart) : null,
    blFinish: t.blFinish ? daysBetween(minStart, t.blFinish) : null
  }));
  afterDataReplaced();
  commitUndo(before);
}

function afterDataReplaced() {
  collapsed = new Set();
  selectedUid = null;
  renumberIds();
  buildHierarchy();
  migrateBaselines();
  updateBlUI();
  recomputeWbs();
  const res = recalcAll();
  if (!res.ok) alert('คำเตือน: ข้อมูลที่นำเข้ามี Circular Dependency:\n' + res.cycle.slice(0, 12).join('\n'));
  document.getElementById('projName').textContent = state.projName;
  renderAll();
  scheduleSave();
}

/* ---------------------------------------------------------------------
   Structure editing : sequential ID, auto WBS, move / indent / outdent,
   add / delete task, new plan, start-date picker
--------------------------------------------------------------------- */
function renumberIds() {
  const map = new Map();
  state.tasks.forEach((t, i) => map.set(t.uid, i + 1));
  for (const t of state.tasks) {
    const newId = map.get(t.uid);
    t.predecessors = t.predecessors
      .filter(p => map.has(p.id) && map.get(p.id) !== newId)
      .map(p => ({ id: map.get(p.id), type: p.type, lag: p.lag }));
    t.uid = newId;
  }
  collapsed = new Set([...collapsed].filter(u => map.has(u)).map(u => map.get(u)));
  if (selectedUid !== null) selectedUid = map.has(selectedUid) ? map.get(selectedUid) : null;
}

function recomputeWbs() {
  let counters = [];
  for (const t of state.tasks) {
    const L = t.outlineLevel;
    for (let l = 1; l < L; l++) if (!counters[l]) counters[l] = 1;
    counters[L] = (counters[L] || 0) + 1;
    counters = counters.slice(0, L + 1);
    t.wbs = counters.slice(1).join('.');
  }
}

function afterStructureChange() {
  renumberIds();
  buildHierarchy();
  recomputeWbs();
  const res = recalcAll();
  if (!res.ok) alert('คำเตือน: พบ Circular Dependency:\n' + res.cycle.slice(0, 12).join('\n'));
  renderAll();
  scheduleSave();
}

function selIndex() {
  const i = selectedUid === null ? -1 : state.tasks.findIndex(t => t.uid === selectedUid);
  if (i < 0) alert('กรุณาคลิกเลือกแถวงานในตารางก่อน');
  return i;
}

// exclusive end index of the subtree rooted at index i
function subtreeEnd(i) {
  const L = state.tasks[i].outlineLevel;
  let j = i + 1;
  while (j < state.tasks.length && state.tasks[j].outlineLevel > L) j++;
  return j;
}

function indentTask() {
  const i = selIndex(); if (i < 0) return;
  const t = state.tasks[i];
  if (i === 0 || state.tasks[i - 1].outlineLevel < t.outlineLevel) { alert('เลื่อนขวาไม่ได้ — ไม่มีงานด้านบนที่จะเป็นงานหลัก'); return; }
  const before = snapshot();
  const j = subtreeEnd(i);
  for (let k = i; k < j; k++) state.tasks[k].outlineLevel++;
  afterStructureChange();
  commitUndo(before);
}

function outdentTask() {
  const i = selIndex(); if (i < 0) return;
  if (state.tasks[i].outlineLevel <= 1) { alert('เลื่อนซ้ายไม่ได้ — อยู่ระดับบนสุดแล้ว'); return; }
  const before = snapshot();
  const j = subtreeEnd(i);
  for (let k = i; k < j; k++) state.tasks[k].outlineLevel--;
  afterStructureChange();
  commitUndo(before);
}

function moveTask(dir) {
  const i = selIndex(); if (i < 0) return;
  const L = state.tasks[i].outlineLevel, j = subtreeEnd(i);
  const before = snapshot();
  if (dir < 0) {
    let p = i - 1;
    while (p >= 0 && state.tasks[p].outlineLevel > L) p--;
    if (p < 0 || state.tasks[p].outlineLevel < L) { alert('ย้ายขึ้นไม่ได้ — ไม่มีงานระดับเดียวกันด้านบน'); return; }
    const block = state.tasks.splice(i, j - i);
    state.tasks.splice(p, 0, ...block);
  } else {
    if (j >= state.tasks.length || state.tasks[j].outlineLevel < L) { alert('ย้ายลงไม่ได้ — ไม่มีงานระดับเดียวกันด้านล่าง'); return; }
    const nEnd = subtreeEnd(j);
    const block = state.tasks.splice(i, j - i);
    state.tasks.splice(i + (nEnd - j), 0, ...block);
  }
  afterStructureChange();
  commitUndo(before);
}

// ลากแถว (พร้อม subtree) ไปวางก่อน/หลังแถวปลายทาง — destUid = null คือวางต่อท้ายตาราง
function dropTaskAt(srcUid, destUid, after) {
  const si = state.tasks.findIndex(t => t.uid === srcUid);
  if (si < 0) return;
  const sj = subtreeEnd(si);
  let di, refLevel;
  if (destUid === null) {
    di = state.tasks.length;
    refLevel = state.tasks[si].outlineLevel;
  } else {
    const d = state.tasks.findIndex(t => t.uid === destUid);
    if (d < 0) return;
    if (d >= si && d < sj) return; // วางลงในกลุ่มงานของตัวเองไม่ได้
    di = after ? subtreeEnd(d) : d;
    refLevel = state.tasks[d].outlineLevel;
  }
  if (di >= si && di <= sj) return; // ตำแหน่งเดิม — ไม่ต้องย้าย
  const before = snapshot();
  let shift = refLevel - state.tasks[si].outlineLevel;
  if (state.tasks[si].outlineLevel + shift < 1) shift = 1 - state.tasks[si].outlineLevel;
  const block = state.tasks.splice(si, sj - si);
  for (const t of block) t.outlineLevel = Math.max(1, t.outlineLevel + shift);
  if (di > si) di -= block.length;
  state.tasks.splice(di, 0, ...block);
  selectedUid = block[0].uid;
  afterStructureChange();
  commitUndo(before);
}

function addTask() {
  const before = snapshot();
  let idx = state.tasks.length, level = 1;
  if (selectedUid !== null) {
    const i = state.tasks.findIndex(t => t.uid === selectedUid);
    if (i >= 0) { idx = subtreeEnd(i); level = state.tasks[i].outlineLevel; }
  }
  const tmpUid = state.tasks.reduce((m, t) => Math.max(m, t.uid), 0) + 1;
  state.tasks.splice(idx, 0, {
    uid: tmpUid, wbs: '', outlineLevel: level, name: 'งานใหม่', duration: 1, milestone: false,
    predecessors: [], percentComplete: 0, baselineCost: 0, actualCost: 0,
    snet: 0, blStart: null, blFinish: null, bl: {},
    cpm: { es: 0, ef: 1, ls: 0, lf: 1, totalFloat: 0, freeFloat: 0, isCritical: false }
  });
  selectedUid = tmpUid;
  afterStructureChange();
  commitUndo(before);
}

/* ---- Copy / Paste row (รวมงานย่อยทั้ง subtree) ---- */
let taskClipboard = null;

function copyTask() {
  const i = selIndex(); if (i < 0) return;
  const j = subtreeEnd(i);
  taskClipboard = state.tasks.slice(i, j).map(t => ({
    uid: t.uid, outlineLevel: t.outlineLevel, name: t.name,
    duration: t.isSummary ? 0 : t.duration, milestone: t.milestone,
    predecessors: t.predecessors.map(p => ({ ...p })),
    percentComplete: t.isSummary ? 0 : t.percentComplete,
    baselineCost: t.baselineCost, actualCost: t.actualCost,
    snet: t.snet, bl: JSON.parse(JSON.stringify(t.bl || {}))
  }));
}

function pasteTask() {
  if (!taskClipboard || !taskClipboard.length) {
    alert('ยังไม่มีงานที่คัดลอกไว้ — เลือกแถวแล้วกดปุ่มคัดลอก (Ctrl+C) ก่อน');
    return;
  }
  const before = snapshot();
  let idx = state.tasks.length, refLevel = taskClipboard[0].outlineLevel;
  if (selectedUid !== null) {
    const i = state.tasks.findIndex(t => t.uid === selectedUid);
    if (i >= 0) { idx = subtreeEnd(i); refLevel = state.tasks[i].outlineLevel; }
  }
  let shift = refLevel - taskClipboard[0].outlineLevel;
  if (taskClipboard[0].outlineLevel + shift < 1) shift = 1 - taskClipboard[0].outlineLevel;
  let nextUid = state.tasks.reduce((m, t) => Math.max(m, t.uid), 0) + 1;
  const map = new Map();
  for (const t of taskClipboard) map.set(t.uid, nextUid++);
  // remap predecessor ภายใน block ที่คัดลอกมา — อ้างอิงภายนอกคงไว้ (renumberIds กรอง id ที่ไม่มีจริงให้)
  const block = taskClipboard.map(t => ({
    uid: map.get(t.uid), wbs: '', outlineLevel: Math.max(1, t.outlineLevel + shift),
    name: t.name, duration: t.duration, milestone: t.milestone,
    predecessors: t.predecessors.map(p => ({ id: map.has(p.id) ? map.get(p.id) : p.id, type: p.type, lag: p.lag })),
    percentComplete: t.percentComplete, baselineCost: t.baselineCost, actualCost: t.actualCost,
    snet: t.snet, blStart: null, blFinish: null, bl: JSON.parse(JSON.stringify(t.bl || {})),
    cpm: { es: 0, ef: 0, ls: 0, lf: 0, totalFloat: 0, freeFloat: 0, isCritical: false }
  }));
  state.tasks.splice(idx, 0, ...block);
  selectedUid = block[0].uid;
  applyActiveBaseline();
  afterStructureChange();
  commitUndo(before);
}

function deleteTask() {
  const i = selIndex(); if (i < 0) return;
  const j = subtreeEnd(i);
  if (j - i >= state.tasks.length) { alert('ต้องเหลืองานอย่างน้อย 1 รายการ'); return; }
  const t = state.tasks[i];
  if (!confirm(`ลบงาน "${t.name}"${j - i > 1 ? ` และงานย่อยอีก ${j - i - 1} รายการ` : ''}?`)) return;
  const before = snapshot();
  state.tasks.splice(i, j - i);
  selectedUid = null;
  afterStructureChange();
  commitUndo(before);
}

function newPlan() {
  if (!confirm('เริ่มสร้างแผนงานใหม่? ข้อมูลปัจจุบันจะถูกแทนที่ (หากต้องการเก็บไว้ ให้กด Save As ก่อน)')) return;
  const name = prompt('ชื่อโครงการ', 'โครงการใหม่');
  if (name === null) return;
  const before = snapshot();
  const today = toISO(new Date());
  state = {
    projectStart: today, statusDate: today, baselineSet: false, activeBl: 1,
    zoom: 'week', zoomPx: null, showLinks: false, showCritical: false, evmVisible: true,
    projName: name.trim() || 'โครงการใหม่',
    tasks: [{
      uid: 1, wbs: '1', outlineLevel: 1, name: 'งานที่ 1', duration: 5, milestone: false,
      predecessors: [], percentComplete: 0, baselineCost: 0, actualCost: 0,
      snet: 0, blStart: null, blFinish: null, bl: {}
    }]
  };
  collapsed = new Set();
  selectedUid = null;
  document.getElementById('projName').textContent = state.projName;
  document.getElementById('statusDate').value = state.statusDate;
  updateBlUI();
  applyCritUI();
  afterStructureChange();
  commitUndo(before);
}

// move the day-number origin earlier so a start date before projectStart stays representable
function rebaseProjectStart(newStart) {
  const shift = daysBetween(newStart, state.projectStart);
  for (const t of state.tasks) {
    t.snet = (t.snet || 0) + shift;
    if (t.blStart !== null) t.blStart += shift;
    if (t.blFinish !== null) t.blFinish += shift;
    if (t.bl) for (const k in t.bl) if (t.bl[k]) { t.bl[k].s += shift; t.bl[k].f += shift; }
  }
  state.projectStart = newStart;
}

function openStartPicker(anchor, t) {
  const inp = document.getElementById('startPick');
  const r = anchor.getBoundingClientRect();
  inp.style.left = r.left + 'px';
  inp.style.top = (r.bottom + 2) + 'px';
  inp.value = toISO(d2date(t.cpm.es));
  inp.dataset.uid = t.uid;
  try { inp.showPicker(); } catch (err) { inp.focus(); inp.click(); }
}

/* ---------------------------------------------------------------------
   Print / PDF  (A3 landscape, fit-to-width, paginate at row boundaries)
--------------------------------------------------------------------- */
function printA3() {
  const totalDays = Math.max(projectEndDay + 3, 1);
  const MM2PX = 96 / 25.4;
  // A3 landscape 420mm - margins 2x8mm = 404mm ; left columns 117mm + slack
  const gW = Math.round(284 * MM2PX);
  const px = gW / totalDays;
  const rh = 15;
  const ps = fromISO(state.projectStart);

  const months = [];
  let d = new Date(ps.getFullYear(), ps.getMonth(), 1);
  const endD = new Date(ps.getTime() + totalDays * DAY);
  while (d < endD) {
    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    months.push({
      s: Math.max(0, Math.round((d - ps) / DAY)),
      e: Math.min(totalDays, Math.round((next - ps) / DAY)),
      m: d.getMonth(), y: d.getFullYear()
    });
    d = next;
  }
  let hd = '';
  for (const m of months) {
    if ((m.e - m.s) * px > 20)
      hd += `<text x="${((m.s + m.e) / 2 * px).toFixed(1)}" y="11" text-anchor="middle" font-size="7.5" fill="#444">${THM[m.m]} ${String((m.y + 543) % 100).padStart(2,'0')}</text>`;
    hd += `<line x1="${(m.e * px).toFixed(1)}" y1="0" x2="${(m.e * px).toFixed(1)}" y2="16" stroke="#C9C9D2" stroke-width="0.6"/>`;
  }
  const sdDay = isoToDay(state.statusDate);

  const rowSvg = t => {
    const p = [`<svg width="${gW}" height="${rh}">`];
    for (const m of months)
      p.push(`<line x1="${(m.e * px).toFixed(1)}" y1="0" x2="${(m.e * px).toFixed(1)}" y2="${rh}" stroke="#ECECF2" stroke-width="0.6"/>`);
    if (sdDay >= 0 && sdDay <= totalDays)
      p.push(`<line x1="${(sdDay * px).toFixed(1)}" y1="0" x2="${(sdDay * px).toFixed(1)}" y2="${rh}" stroke="#B45309" stroke-width="0.8" stroke-dasharray="3,2"/>`);
    const x = t.cpm.es * px, w = Math.max((t.cpm.ef - t.cpm.es) * px, 1.5), yC = rh / 2;
    const c = barColor(t);
    if (t.milestone || (!t.isSummary && t.duration === 0)) {
      p.push(`<path d="M${x},${yC - 5} L${x + 5},${yC} L${x},${yC + 5} L${x - 5},${yC} Z" fill="${c}"/>`);
    } else if (t.isSummary) {
      p.push(`<rect x="${x}" y="${yC - 4.5}" width="${w}" height="9" rx="1.5" fill="${c}"/>`);
    } else {
      p.push(`<rect x="${x}" y="${yC - 4.5}" width="${w}" height="9" rx="1.5" fill="${c}" opacity="0.9"/>`);
      if (t.percentComplete > 0)
        p.push(`<rect x="${x}" y="${yC - 4.5}" width="${w * Math.min(t.percentComplete, 100) / 100}" height="9" rx="1.5" fill="#000" opacity="0.3"/>`);
      if (state.baselineSet && t.blStart !== null)
        p.push(`<rect x="${t.blStart * px}" y="${yC + 5}" width="${Math.max((t.blFinish - t.blStart) * px, 1.5)}" height="2" fill="#B5B5C0"/>`);
    }
    p.push('</svg>');
    return p.join('');
  };

  const body = visibleRows.map(t => {
    const cls = (t.isSummary ? 'sum' : '') + ((state.showCritical && t.cpm.isCritical) ? ' crit' : '');
    return `<tr class="${cls}">
      <td class="num">${t.uid}</td><td>${esc(t.wbs)}</td>
      <td class="nm" style="padding-left:${(t.outlineLevel - 1) * 2.5}mm">${t.milestone ? '&#9670; ' : ''}${esc(t.name)}</td>
      <td class="num">${fmtNum(t.duration, t.duration % 1 ? 1 : 0)}</td>
      <td>${fmtDay(t.cpm.es)}</td><td>${fmtDay(t.duration > 0 ? t.cpm.ef - 1 : t.cpm.ef)}</td>
      <td class="num">${fmtNum(t.percentComplete, 0)}</td>
      <td class="g">${rowSvg(t)}</td></tr>`;
  }).join('');

  const printedAt = new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  const html = `<!DOCTYPE html><html lang="th"><head><meta charset="utf-8">
<title>${esc(state.projName)} — แผนงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@page{size:A3 landscape;margin:8mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Prompt','Leelawadee UI',Tahoma,sans-serif;color:#191919}
#hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2mm;border-bottom:1.5pt solid #1B365D;padding-bottom:1.5mm}
#hdr h1{font-size:13pt;color:#1B365D;font-weight:600}
#hdr .sub{font-size:8pt;color:#555}
table{border-collapse:collapse;width:100%;table-layout:fixed}
thead{display:table-header-group}
th{font-size:7pt;color:#555;text-align:left;border-bottom:1pt solid #999;padding:1pt 2pt;background:#F2F2F6;font-weight:500}
td{font-size:7pt;border-bottom:0.4pt solid #E2E2EA;padding:0 2pt;white-space:nowrap;overflow:hidden;height:${rh}px;vertical-align:middle}
td.num,th.num{text-align:right}
td.g{padding:0}
tr{page-break-inside:avoid}
tr.sum td{font-weight:600;color:#000;background:#F7F8FB}
tr.crit td.nm{color:#D0342C}
svg{display:block}
</style></head><body>
<div id="hdr"><h1>${esc(state.projName)} — แผนงานก่อสร้าง</h1>
<div class="sub">Status Date: ${fmtDay(sdDay)} &nbsp;|&nbsp; พิมพ์เมื่อ: ${printedAt} &nbsp;|&nbsp; ระยะเวลารวม ${Math.round(projectEndDay)} วัน &nbsp;|&nbsp; Baseline ${state.activeBl || 1}: ${state.baselineSet ? 'บันทึกแล้ว' : 'ยังไม่บันทึก'}</div></div>
<table>
<colgroup><col style="width:9mm"><col style="width:14mm"><col style="width:52mm"><col style="width:8mm"><col style="width:13mm"><col style="width:13mm"><col style="width:8mm"><col></colgroup>
<thead><tr><th class="num">ID</th><th>WBS</th><th>ชื่องาน</th><th class="num">วัน</th><th>เริ่ม</th><th>เสร็จ</th><th class="num">%</th>
<th style="padding:0"><svg width="${gW}" height="16">${hd}</svg></th></tr></thead>
<tbody>${body}</tbody></table>
<script>window.addEventListener('load',function(){setTimeout(function(){window.print()},400)});<\/script>
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('เบราว์เซอร์บล็อกหน้าต่างพิมพ์ กรุณาอนุญาต popup สำหรับหน้านี้'); return; }
  w.document.write(html);
  w.document.close();
}

/* ---------------------------------------------------------------------
   Event wiring
--------------------------------------------------------------------- */
function wireEvents() {
  const tbody = document.getElementById('taskBody');
  tbody.addEventListener('click', e => {
    const tr = e.target.closest('tr[data-uid]');
    if (tr) {
      selectedUid = parseInt(tr.dataset.uid, 10);
      tbody.querySelectorAll('tr.selrow').forEach(r => r.classList.remove('selrow'));
      tr.classList.add('selrow');
    }
    const tog = e.target.closest('[data-tog]');
    if (tog) {
      const uid = parseInt(tog.dataset.tog, 10);
      collapsed.has(uid) ? collapsed.delete(uid) : collapsed.add(uid);
      renderAll(); scheduleSave();
      return;
    }
    const spin = e.target.closest('[data-spin]');
    if (spin) {
      const t = byUid.get(parseInt(spin.closest('td').dataset.uid, 10));
      if (t) {
        const before = snapshot();
        t.duration = Math.max(0, Math.round((t.duration + parseFloat(spin.dataset.spin)) * 100) / 100);
        t.milestone = t.duration === 0;
        recalcAll(); commitUndo(before); renderAll(); scheduleSave();
      }
      return;
    }
    const cal = e.target.closest('[data-cal]');
    if (cal) {
      const t = byUid.get(parseInt(cal.dataset.cal, 10));
      if (t) openStartPicker(cal, t);
      return;
    }
    const td = e.target.closest('td.editable');
    if (td) beginEdit(td);
  });

  // drag & drop สลับตำแหน่งแถว (ย้ายทั้ง subtree)
  let dragSrcUid = null;
  const clearDropMarks = () =>
    tbody.querySelectorAll('.drop-above,.drop-below').forEach(r => r.classList.remove('drop-above', 'drop-below'));
  tbody.addEventListener('dragstart', e => {
    const tr = e.target.closest('tr[data-uid]');
    if (!tr || tr.querySelector('input.cellEdit')) { e.preventDefault(); return; }
    dragSrcUid = parseInt(tr.dataset.uid, 10);
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', tr.dataset.uid); } catch (err) { /* ignore */ }
    tr.classList.add('dragging');
  });
  tbody.addEventListener('dragover', e => {
    if (dragSrcUid === null) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const tr = e.target.closest('tr[data-uid]');
    clearDropMarks();
    if (!tr) return;
    const r = tr.getBoundingClientRect();
    tr.classList.add(e.clientY > r.top + r.height / 2 ? 'drop-below' : 'drop-above');
  });
  tbody.addEventListener('drop', e => {
    if (dragSrcUid === null) return;
    e.preventDefault();
    const tr = e.target.closest('tr[data-uid]');
    clearDropMarks();
    const src = dragSrcUid;
    dragSrcUid = null;
    if (!tr) { dropTaskAt(src, null, true); return; }
    const r = tr.getBoundingClientRect();
    dropTaskAt(src, parseInt(tr.dataset.uid, 10), e.clientY > r.top + r.height / 2);
  });
  tbody.addEventListener('dragend', () => {
    dragSrcUid = null;
    clearDropMarks();
    tbody.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
  });

  const startPick = document.getElementById('startPick');
  startPick.addEventListener('change', () => {
    const t = byUid.get(parseInt(startPick.dataset.uid, 10));
    if (!t || !startPick.value) return;
    const before = snapshot();
    if (daysBetween(state.projectStart, startPick.value) < 0) rebaseProjectStart(startPick.value);
    t.snet = isoToDay(startPick.value);
    if (t.predecessors.length)
      alert('หมายเหตุ: งานนี้มีงานก่อนหน้า วันเริ่มจริงจะถูกคำนวณจากงานก่อนหน้า ไม่ใช่วันที่เลือก');
    recalcAll(); commitUndo(before); renderAll(); scheduleSave();
  });

  // scroll sync (vertical both ways; gantt owns horizontal)
  const left = document.getElementById('leftPane'), right = document.getElementById('rightPane');
  let lock = false;
  left.addEventListener('scroll', () => { if (lock) return; lock = true; right.scrollTop = left.scrollTop; requestAnimationFrame(() => lock = false); });
  right.addEventListener('scroll', () => { if (lock) return; lock = true; left.scrollTop = right.scrollTop; requestAnimationFrame(() => lock = false); });

  // divider drag
  const divider = document.getElementById('divider');
  divider.addEventListener('mousedown', e => {
    e.preventDefault();
    const startX = e.clientX, startW = left.getBoundingClientRect().width;
    const move = ev => { left.style.flexBasis = Math.max(320, Math.min(window.innerWidth * 0.75, startW + ev.clientX - startX)) + 'px'; };
    const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  });

  // toolbar
  document.getElementById('btnUndo').addEventListener('click', doUndo);
  document.getElementById('btnRedo').addEventListener('click', doRedo);
  document.addEventListener('keydown', e => {
    if (!(e.ctrlKey || e.metaKey)) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    const k = e.key.toLowerCase();
    if (k === 'z') { e.preventDefault(); e.shiftKey ? doRedo() : doUndo(); }
    else if (k === 'y') { e.preventDefault(); doRedo(); }
    else if (k === 'c') { if (selectedUid !== null && window.getSelection().isCollapsed) { e.preventDefault(); copyTask(); } }
    else if (k === 'v') { if (taskClipboard) { e.preventDefault(); pasteTask(); } }
  });

  const blSel = document.getElementById('blSel');
  blSel.addEventListener('change', () => {
    const before = snapshot();
    state.activeBl = parseInt(blSel.value, 10) || 1;
    applyActiveBaseline();
    recalcAll(); commitUndo(before); renderAll(); scheduleSave(); updateBlUI();
  });
  document.getElementById('btnBaseline').addEventListener('click', () => {
    const slot = parseInt(blSel.value, 10) || 1;
    if (slotHasData(slot) && !confirm(`Baseline ${slot} มีข้อมูลเดิมอยู่แล้ว ต้องการบันทึกทับหรือไม่?`)) return;
    const before = snapshot();
    for (const t of state.tasks) {
      if (!t.bl) t.bl = {};
      if (!t.isSummary) t.bl[slot] = { s: t.cpm.es, f: t.cpm.ef };
    }
    state.activeBl = slot;
    applyActiveBaseline();
    recalcAll(); commitUndo(before); renderAll(); scheduleSave(); updateBlUI();
  });
  document.getElementById('btnClearBaseline').addEventListener('click', () => {
    const slot = parseInt(blSel.value, 10) || 1;
    if (!slotHasData(slot)) return;
    if (!confirm(`ต้องการล้าง Baseline ${slot} หรือไม่?`)) return;
    const before = snapshot();
    for (const t of state.tasks) if (t.bl) delete t.bl[slot];
    applyActiveBaseline();
    recalcAll(); commitUndo(before); renderAll(); scheduleSave(); updateBlUI();
  });
  const sd = document.getElementById('statusDate');
  sd.value = state.statusDate;
  sd.addEventListener('change', () => {
    if (!sd.value) return;
    const before = snapshot();
    state.statusDate = sd.value;
    recalcAll(); commitUndo(before); renderAll(); scheduleSave();
  });
  const zoomSel = document.getElementById('zoomSel');
  zoomSel.value = state.zoom;
  zoomSel.addEventListener('change', () => { state.zoom = zoomSel.value; state.zoomPx = null; renderGantt(); scheduleSave(); });

  const curPx = () => state.zoomPx || ZOOM_PX[state.zoom];
  const setZoomPx = v => { state.zoomPx = Math.max(0.4, Math.min(60, v)); renderGantt(); scheduleSave(); };
  document.getElementById('btnZoomIn').addEventListener('click', () => setZoomPx(curPx() * 1.4));
  document.getElementById('btnZoomOut').addEventListener('click', () => setZoomPx(curPx() / 1.4));
  document.getElementById('btnFit').addEventListener('click', () => {
    const w = document.getElementById('rightPane').clientWidth - 24;
    setZoomPx(w / Math.max(projectEndDay + 5, 1));
  });

  const btnLinks = document.getElementById('btnLinks');
  btnLinks.classList.toggle('toggled', state.showLinks);
  btnLinks.addEventListener('click', () => {
    state.showLinks = !state.showLinks;
    btnLinks.classList.toggle('toggled', state.showLinks);
    renderGantt(); scheduleSave();
  });
  const btnCritical = document.getElementById('btnCritical');
  btnCritical.addEventListener('click', () => {
    state.showCritical = !state.showCritical;
    applyCritUI();
    renderAll(); scheduleSave();
  });
  const btnEvm = document.getElementById('btnEvm');
  btnEvm.classList.toggle('toggled', state.evmVisible);
  btnEvm.addEventListener('click', () => {
    state.evmVisible = !state.evmVisible;
    btnEvm.classList.toggle('toggled', state.evmVisible);
    renderEVM(); scheduleSave();
  });
  document.getElementById('btnCollapse').addEventListener('click', () => {
    for (const t of state.tasks) if (t.children.length && t.outlineLevel >= 3) collapsed.add(t.uid);
    renderAll(); scheduleSave();
  });
  document.getElementById('btnExpand').addEventListener('click', () => { collapsed.clear(); renderAll(); scheduleSave(); });
  document.getElementById('levelSel').addEventListener('change', e => {
    const n = parseInt(e.target.value, 10);
    if (!n) return;
    collapsed = new Set();
    for (const t of state.tasks) if (t.children.length && t.outlineLevel >= n) collapsed.add(t.uid);
    renderAll(); scheduleSave();
    e.target.value = '';
  });

  // tooltip
  const tip = document.getElementById('tip');
  const topbar = document.getElementById('topbar');
  const hideTip = () => { tip.style.display = 'none'; };
  topbar.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) { hideTip(); return; }
    tip.textContent = el.dataset.tip;
    tip.style.display = 'block';
    const r = el.getBoundingClientRect();
    tip.style.top = (r.bottom + 6) + 'px';
    const x = r.left + r.width / 2 - tip.offsetWidth / 2;
    tip.style.left = Math.max(6, Math.min(x, window.innerWidth - tip.offsetWidth - 6)) + 'px';
  });
  topbar.addEventListener('mouseleave', hideTip);
  topbar.addEventListener('click', hideTip);

  document.getElementById('btnAddTask').addEventListener('click', addTask);
  document.getElementById('btnDelTask').addEventListener('click', deleteTask);
  document.getElementById('btnCopyTask').addEventListener('click', copyTask);
  document.getElementById('btnPasteTask').addEventListener('click', pasteTask);
  document.getElementById('btnMoveUp').addEventListener('click', () => moveTask(-1));
  document.getElementById('btnMoveDown').addEventListener('click', () => moveTask(1));
  document.getElementById('btnOutdent').addEventListener('click', outdentTask);
  document.getElementById('btnIndent').addEventListener('click', indentTask);
  document.getElementById('btnNew').addEventListener('click', newPlan);

  document.getElementById('btnPrint').addEventListener('click', printA3);
  document.getElementById('btnSaveAs').addEventListener('click', saveAsFile);
  document.getElementById('btnImportJson').addEventListener('click', () => document.getElementById('fileJson').click());
  document.getElementById('btnImportXml').addEventListener('click', () => document.getElementById('fileXml').click());
  document.getElementById('btnImportXlsx').addEventListener('click', () => document.getElementById('fileXlsx').click());
  document.getElementById('fileJson').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    f.text().then(importJSON); e.target.value = '';
  });
  document.getElementById('fileXml').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    f.text().then(importXML); e.target.value = '';
  });
  document.getElementById('fileXlsx').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    f.arrayBuffer().then(importXLSX); e.target.value = '';
  });
}

/* ---------------------------------------------------------------------
   Boot
--------------------------------------------------------------------- */
(function init() {
  const saved = loadState();
  state = saved || buildDefaultState();
  if (!saved) collapsed = new Set();
  renumberIds();
  document.getElementById('projName').textContent = state.projName || '';
  buildHierarchy();
  migrateBaselines();
  recomputeWbs();
  const res = recalcAll();
  if (!res.ok) alert('คำเตือน: ข้อมูลตั้งต้นมี Circular Dependency:\n' + res.cycle.slice(0, 12).join('\n'));
  wireEvents();
  wireColResize();
  applyCritUI();
  updateBlUI();
  updateUndoButtons();
  renderAll();
})();
</script>
</body>
</html>
